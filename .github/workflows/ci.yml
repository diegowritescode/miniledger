name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: miniledger
          POSTGRES_PASSWORD: miniledger
          POSTGRES_DB: miniledger
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U miniledger"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgres://miniledger:miniledger@localhost:5432/miniledger
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run db:migrate
      - run: npm run coverage

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
